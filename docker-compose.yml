services:
  backend:
    build: .
    container_name: country_agent_backend
    # Mount local repo to container for hot-reloading
    volumes:
      - .:/app
    # Override Dockerfile CMD to force uvicorn reload worker
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: country_agent_frontend
    environment:
      - VITE_API_URL=http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - backend
